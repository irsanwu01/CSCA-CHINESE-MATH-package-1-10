<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel · CSCA 数学</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #0b2b40, #1a4b6d); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .admin-container { max-width: 1200px; width: 100%; background: white; border-radius: 48px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .header { background: #132433; color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 2rem; margin-bottom: 10px; }
        .login-box { max-width: 400px; margin: 50px auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .login-box h2 { color: #132433; margin-bottom: 30px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group input { width: 100%; padding: 15px 20px; border: 2px solid #e0e7ef; border-radius: 30px; font-size: 1rem; }
        .btn { background: #132433; color: white; border: none; padding: 15px; border-radius: 30px; width: 100%; font-size: 1.2rem; cursor: pointer; }
        .error { color: #e74c3c; text-align: center; margin: 10px 0; }
        .dashboard { display: none; padding: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #f0f4fa; border-radius: 20px; padding: 20px; text-align: center; }
        .stat-card h3 { color: #5f6b7a; font-size: 1rem; margin-bottom: 10px; }
        .stat-card .number { font-size: 2.5rem; font-weight: 700; color: #132433; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; }
        th { background: #132433; color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #e0e7ef; }
        .status-pending { background: #fff3cd; color: #856404; padding: 5px 15px; border-radius: 20px; }
        .status-active { background: #d4edda; color: #155724; padding: 5px 15px; border-radius: 20px; }
        .btn-approve { background: #28a745; color: white; border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer; }
        .btn-reject { background: #dc3545; color: white; border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer; }
        .creator-tag { text-align: center; padding: 20px; color: #5f6b7a; font-style: italic; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="header">
            <h1>CSCA Admin Panel</h1>
            <p>created by Irsanwu</p>
        </div>

        <!-- Login Form -->
        <div id="loginSection" class="login-box">
            <h2>Admin Login</h2>
            <div class="form-group">
                <input type="text" id="username" placeholder="Username" value="admin">
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" value="admin123">
            </div>
            <div id="loginError" class="error"></div>
            <button class="btn" onclick="adminLogin()">Login</button>
        </div>

        <!-- Admin Dashboard -->
        <div id="dashboardSection" class="dashboard">
            <h2 style="color: #132433; margin-bottom: 20px;">Dashboard Admin</h2>
            
            <!-- Stats -->
            <div class="stats-grid" id="statsContainer">
                <div class="stat-card">
                    <h3>Total Users</h3>
                    <div class="number" id="totalUsers">0</div>
                </div>
                <div class="stat-card">
                    <h3>Pending</h3>
                    <div class="number" id="pendingUsers">0</div>
                </div>
                <div class="stat-card">
                    <h3>Active</h3>
                    <div class="number" id="activeUsers">0</div>
                </div>
            </div>

            <!-- Users Table -->
            <h3 style="color: #132433; margin: 20px 0;">Daftar Users</h3>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>CSCA ID</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Data will be inserted here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Load users from localStorage
        let users = JSON.parse(localStorage.getItem('csca_users')) || [];

        // Demo users if empty
        if (users.length === 0) {
            users = [
                { id: '1', name: 'Zhang Ming', email: 'zhang@email.com', password: '123456', cscaId: 'CSCA-001', registered: new Date().toISOString(), status: 'pending' },
                { id: '2', name: 'Li Wei', email: 'li@email.com', password: '123456', cscaId: 'CSCA-002', registered: new Date().toISOString(), status: 'pending' }
            ];
            localStorage.setItem('csca_users', JSON.stringify(users));
        }

        function adminLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === 'admin' && password === 'admin123') {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                loadUsers();
            } else {
                document.getElementById('loginError').innerText = 'Username atau password salah!';
            }
        }

        function loadUsers() {
            users = JSON.parse(localStorage.getItem('csca_users')) || [];
            
            // Update stats
            document.getElementById('totalUsers').innerText = users.length;
            document.getElementById('pendingUsers').innerText = users.filter(u => u.status === 'pending').length;
            document.getElementById('activeUsers').innerText = users.filter(u => u.status === 'active').length;

            // Render table
            let html = '';
            users.forEach(user => {
                const statusClass = user.status === 'pending' ? 'status-pending' : 'status-active';
                html += `<tr>
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                    <td>${user.cscaId || '-'}</td>
                    <td><span class="${statusClass}">${user.status}</span></td>
                    <td>
                        ${user.status === 'pending' ? 
                            `<button class="btn-approve" onclick="approveUser('${user.id}')">Approve</button>
                             <button class="btn-reject" onclick="rejectUser('${user.id}')">Reject</button>` : 
                            '<span>Active</span>'
                        }
                    </td>
                </tr>`;
            });
            document.getElementById('usersTableBody').innerHTML = html;
        }

        function approveUser(userId) {
            users = users.map(u => {
                if (u.id === userId) u.status = 'active';
                return u;
            });
            localStorage.setItem('csca_users', JSON.stringify(users));
            loadUsers();
            alert('User approved!');
        }

        function rejectUser(userId) {
            users = users.map(u => {
                if (u.id === userId) u.status = 'inactive';
                return u;
            });
            localStorage.setItem('csca_users', JSON.stringify(users));
            loadUsers();
            alert('User rejected');
        }
    </script>
</body>
</html>
